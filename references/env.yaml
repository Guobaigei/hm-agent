required:
  - name: AI_API_KEY
    purpose: hm-agent 自己调用百炼模型时使用的鉴权 key
    example: ${AI_API_KEY}
  - name: HM_BASE_URL
    purpose: 海绵系统网关公共前缀（由环境提供，示例占位勿用于公网文档暴露真实地址）
    example: https://your-hm-gateway.example/sponge/admin
  - name: HM_DULIDAY_TOKEN
    purpose: 海绵系统请求头 Duliday-Token
    example: ${HM_DULIDAY_TOKEN}

optional:
  - name: AI_BASE_URL
    purpose: 百炼 OpenAI 兼容接口 base URL
    default: https://dashscope.aliyuncs.com/compatible-mode/v1
  - name: AI_MODEL
    purpose: 默认模型名称
    default: qwen3.5-plus
  - name: HM_TIMEOUT_MS
    purpose: 海绵接口请求超时时间，单位毫秒
    default: "15000"
  - name: HM_REQUEST_STRATEGY
    purpose: 海绵接口请求策略，当前默认 auto，按 POST JSON -> POST form 尝试
    default: auto
  - name: LOG_LEVEL
    purpose: CLI 等入口日志级别（MCP stdio 下内部 logger 通常为 silent）
    default: info
  - name: MAX_TOOL_RESULTS
    purpose: 每次查询最多保留多少条候选结果
    default: "5"
